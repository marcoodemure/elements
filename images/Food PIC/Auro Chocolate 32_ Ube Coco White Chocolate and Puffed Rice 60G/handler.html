<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Clean Swipe Carousel</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

.scene {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.carousel {
  width: 100%;
  overflow: hidden;
  position: relative;
  touch-action: pan-y;
}

.track {
  display: flex;
  transition: transform 0.35s ease;
}

.card {
  min-width: 100%;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.media {
  width: 100%;
  transform: translateX(0) scale(1);
  opacity: 1;
  transition: transform 0.35s ease, opacity 0.35s ease;
}

.media.loading {
  min-height: 220px;
  border-radius: 10px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.22) 50%, rgba(255,255,255,0.08) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.2s linear infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.media img {
  width: 100%;
  display: block;
  user-select: none;
  user-drag: none;
  -webkit-user-drag: none;
  opacity: 0;
  transition: opacity 0.35s ease, transform 0.2s ease;
}

.media.loaded img,
.media.error img {
  opacity: 1;
}

@media (hover: hover) {
  .media.loaded img:hover {
    transform: scale(1.04);
  }
}

.dots {
  position: absolute;
  bottom: 10px;
  display: flex;
  gap: 8px;
}

.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}

.dot.active {
  background: white;
  transform: scale(1.3);
}
</style>
</head>

<body>
<div class="scene">
  <div class="carousel">
    <div class="track">
      <div class="card"><div class="media loading"><img src="1.png" alt="Product 1" loading="lazy" draggable="false"></div></div>
    </div>
  </div>

  <div class="dots"></div>
</div>

<script>
const carousel = document.querySelector('.carousel');
const track = document.querySelector('.track');
const cards = Array.from(document.querySelectorAll('.card'));
const mediaItems = Array.from(document.querySelectorAll('.media'));
const dotsContainer = document.querySelector('.dots');

const hyperlink = "https://sites.google.com/view/habitlikha/foods/auro-ube-chocolate-bar";
const images = Array.from(document.querySelectorAll('.card img'));

const SWIPE_THRESHOLD = 50;
const TAP_DRAG_THRESHOLD = 12;

let index = 0;
let startX = 0;
let currentX = 0;
let dragDistance = 0;
let isDragging = false;
let suppressClickUntil = 0;

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function applyParallax() {
  const dragInfluence = clamp(currentX / 80, -8, 8);

  mediaItems.forEach((media, i) => {
    const offset = i - index;
    const shift = (offset * 10) - dragInfluence;
    const scale = i === index ? 1 : 0.985;
    const opacity = i === index ? 1 : 0.94;

    media.style.transform = `translateX(${shift}px) scale(${scale})`;
    media.style.opacity = `${opacity}`;
  });
}

cards.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  if (i === 0) dot.classList.add('active');
  dot.addEventListener('click', () => {
    index = i;
    updateCarousel();
  });
  dotsContainer.appendChild(dot);
});

const dots = document.querySelectorAll('.dot');

function updateCarousel() {
  track.style.transition = 'transform 0.35s ease';
  track.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach(dot => dot.classList.remove('active'));
  dots[index].classList.add('active');
  applyParallax();
}

function startDrag(x) {
  startX = x;
  currentX = 0;
  dragDistance = 0;
  isDragging = true;
  track.style.transition = 'none';
}

function drag(x) {
  if (!isDragging) return;
  currentX = x - startX;
  dragDistance = Math.max(dragDistance, Math.abs(currentX));
  track.style.transform = `translateX(calc(-${index * 100}% + ${currentX}px))`;
  applyParallax();
}

function endDrag() {
  if (!isDragging) return;
  isDragging = false;

  if (Math.abs(currentX) > SWIPE_THRESHOLD) {
    if (currentX < 0 && index < cards.length - 1) index++;
    if (currentX > 0 && index > 0) index--;
  }

  if (dragDistance > TAP_DRAG_THRESHOLD) {
    suppressClickUntil = Date.now() + 250;
  }

  currentX = 0;
  updateCarousel();
}

function markMediaReady(img, isError) {
  const media = img.closest('.media');
  if (!media) return;
  media.classList.remove('loading');
  media.classList.add(isError ? 'error' : 'loaded');
}

images.forEach(img => {
  img.addEventListener('dragstart', e => e.preventDefault());

  if (img.complete && img.naturalWidth > 0) {
    markMediaReady(img, false);
  } else {
    img.addEventListener('load', () => markMediaReady(img, false), { once: true });
    img.addEventListener('error', () => markMediaReady(img, true), { once: true });
  }

  img.addEventListener('click', () => {
    if (Date.now() < suppressClickUntil) return;
    if (!hyperlink) return;
    window.open(hyperlink, '_blank', 'noopener,noreferrer');
  });
});

carousel.addEventListener('touchstart', e =>
  startDrag(e.touches[0].clientX)
);
carousel.addEventListener('touchmove', e =>
  drag(e.touches[0].clientX)
);
carousel.addEventListener('touchend', endDrag);

carousel.addEventListener('mousedown', e =>
  startDrag(e.clientX)
);
carousel.addEventListener('mousemove', e =>
  drag(e.clientX)
);
carousel.addEventListener('mouseup', endDrag);
carousel.addEventListener('mouseleave', endDrag);

updateCarousel();
</script>
</body>
</html>
