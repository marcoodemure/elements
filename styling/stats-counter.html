<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Stats Counter</title>
<style>
  :root {
    --text: #111111;
    --muted: #1f1f1f;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
  }

  .stats {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, minmax(180px, 1fr));
    gap: 24px;
    padding: 16px 24px;
  }

  .stat {
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .stat.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .value {
    margin: 0 0 10px;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.4px;
  }

  .label {
    margin: 0;
    font-size: clamp(14px, 1.8vw, 24px);
    color: var(--muted);
  }

  @media (max-width: 760px) {
    .stats {
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 12px 16px;
    }
  }
</style>
</head>
<body>
  <section class="stats" aria-label="Animated Stats">
    <article class="stat">
      <p class="value" data-target="500" data-suffix="+">0+</p>
      <p class="label">Artisans Supported</p>
    </article>
    <article class="stat">
      <p class="value" data-target="1000" data-suffix="+">0+</p>
      <p class="label">Handwoven Products Created</p>
    </article>
    <article class="stat">
      <p class="value" data-target="10" data-suffix="+">0+</p>
      <p class="label">Communities Reached</p>
    </article>
  </section>

<script>
  const stats = Array.from(document.querySelectorAll(".stat"));
  const values = Array.from(document.querySelectorAll(".value"));
  const duration = 1700;

  function formatNumber(num) {
    return new Intl.NumberFormat("en-US").format(num);
  }

  function animateValue(node, delayMs) {
    const target = Number(node.dataset.target || 0);
    const suffix = node.dataset.suffix || "";

    setTimeout(() => {
      const startTime = performance.now();
      const start = target > 0 ? 1 : 0;

      function tick(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(start + (target - start) * eased);
        node.textContent = formatNumber(current) + suffix;

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          node.textContent = formatNumber(target) + suffix;
        }
      }

      requestAnimationFrame(tick);
    }, delayMs);
  }

  stats.forEach((stat, i) => {
    setTimeout(() => stat.classList.add("visible"), i * 180);
  });

  values.forEach((value, i) => {
    animateValue(value, i * 180);
  });
</script>
</body>
</html>
